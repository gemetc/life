<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gem etcetera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1916;
    --paper: #ffffff;
    --muted: #9a978f;
    --rule: #e5e5e5;
    --accent: #2a2825;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Geist', sans-serif;
    font-size: 18px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    padding: 4rem 3rem 2rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .site-title {
    font-family: 'Geist', sans-serif;
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: lowercase;
  }

  nav {
    display: flex;
    gap: 2.5rem;
    font-size: 0.85rem;
    font-family: 'Geist', sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  nav a {
    color: inherit;
    text-decoration: none;
    transition: color 0.2s;
  }

  nav a:hover { color: var(--ink); }

  .section {
    padding: 3.5rem 3rem;
    border-bottom: 1px solid var(--rule);
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }

  .section-title {
    font-family: 'Geist', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-rule {
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .source-link {
    font-family: 'Geist', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.06em;
    transition: color 0.2s;
  }

  .source-link:hover { color: var(--ink); }

  /* Tumblr grid */
  .tumblr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2px;
  }

  .tumblr-card {
    background: #fff;
    border: 1px solid var(--rule);
    overflow: hidden;
    aspect-ratio: 1;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .tumblr-card:hover { border-color: var(--ink); }
  .tumblr-card:hover .card-overlay { opacity: 1; }

  .tumblr-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(15%);
    transition: filter 0.3s;
  }

  .tumblr-card:hover img { filter: grayscale(0%); }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26,25,22,0.82);
    color: #f5f3ef;
    padding: 1.5rem;
    opacity: 0;
    transition: opacity 0.25s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .card-overlay-title {
    font-size: 1rem;
    font-weight: 300;
    line-height: 1.4;
    margin-bottom: 0.5rem;
  }

  .card-overlay-meta {
    font-family: 'Geist', sans-serif;
    font-size: 0.7rem;
    color: rgba(245,243,239,0.55);
    letter-spacing: 0.06em;
  }

  /* Text-only tumblr card */
  .tumblr-card.text-card {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    cursor: pointer;
  }

  .tumblr-card.text-card:hover { background: var(--ink); }
  .tumblr-card.text-card:hover .text-card-inner { color: var(--paper); }

  .text-card-inner {
    font-size: 1rem;
    font-weight: 300;
    line-height: 1.6;
    color: var(--ink);
    transition: color 0.2s;
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Are.na grid */
  .arena-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 2px;
  }

  .arena-card {
    background: #fff;
    border: 1px solid var(--rule);
    overflow: hidden;
    aspect-ratio: 1;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .arena-card:hover { border-color: var(--ink); }

  .arena-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(15%);
    transition: filter 0.3s;
  }

  .arena-card:hover img { filter: grayscale(0%); }

  .arena-card.text-block {
    padding: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .arena-card.text-block:hover { background: var(--ink); }
  .arena-card.text-block:hover .arena-text { color: var(--paper); }

  .arena-text {
    font-size: 0.85rem;
    line-height: 1.55;
    color: var(--ink);
    transition: color 0.2s;
    display: -webkit-box;
    -webkit-line-clamp: 8;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .arena-card.link-block {
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: #f0ede7;
    gap: 0.4rem;
    cursor: pointer;
  }

  .arena-card.link-block:hover { background: var(--ink); }
  .arena-card.link-block:hover .link-title { color: var(--paper); }
  .arena-card.link-block:hover .link-source { color: rgba(245,243,239,0.5); }

  .link-title {
    font-size: 0.85rem;
    line-height: 1.4;
    color: var(--ink);
    transition: color 0.2s;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .link-source {
    font-family: 'Geist', sans-serif;
    font-size: 0.65rem;
    color: var(--muted);
    transition: color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .arena-card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0.8rem 1rem;
    background: linear-gradient(transparent, rgba(26,25,22,0.75));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .arena-card:hover .arena-card-overlay { opacity: 1; }

  .arena-card-title {
    font-size: 0.78rem;
    color: #f5f3ef;
    font-style: italic;
  }

  /* Loading / empty states */
  .loading-state {
    grid-column: 1 / -1;
    padding: 3rem;
    text-align: center;
    font-family: 'Geist', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .error-state {
    grid-column: 1 / -1;
    padding: 2rem 3rem;
    font-family: 'Geist', sans-serif;
    font-size: 0.8rem;
    color: var(--muted);
    border: 1px dashed var(--rule);
    text-align: center;
  }

  footer {
    padding: 2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .footer-note {
    font-family: 'Geist', sans-serif;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  @media (max-width: 600px) {
    header { padding: 2rem 1.5rem 1.5rem; }
    .section { padding: 2.5rem 1.5rem; }
    .tumblr-grid { grid-template-columns: repeat(2, 1fr); }
    .arena-grid { grid-template-columns: repeat(2, 1fr); }
    footer { padding: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <span class="site-title">gem etcetera</span>
  <nav>
    <a href="https://gemetc.tumblr.com" target="_blank" rel="noopener">tumblr</a>
    <a href="https://www.are.na/gem-etcetera" target="_blank" rel="noopener">are.na</a>
  </nav>
</header>

<section class="section" id="tumblr-section">
  <div class="section-header">
    <span class="section-title">Posts</span>
    <div class="section-rule"></div>
    <a class="source-link" href="https://gemetc.tumblr.com" target="_blank" rel="noopener">gemetc.tumblr.com ↗</a>
  </div>
  <div class="tumblr-grid" id="tumblr-grid">
    <div class="loading-state">fetching posts…</div>
  </div>
</section>

<section class="section" id="arena-section">
  <div class="section-header">
    <span class="section-title">Blocks</span>
    <div class="section-rule"></div>
    <a class="source-link" href="https://www.are.na/gem-etcetera/blocks" target="_blank" rel="noopener">are.na/gem-etcetera ↗</a>
  </div>
  <div class="arena-grid" id="arena-grid">
    <div class="loading-state">fetching blocks…</div>
  </div>
</section>

<footer>
  <span class="footer-note">fashion intellectual, designer, etc.</span>
  <span class="footer-note" id="last-updated"></span>
</footer>

<script>
function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

function loadTumblr() {
  const grid = document.getElementById('tumblr-grid');

  // Tumblr's legacy /api/read/json endpoint uses JSONP — no CORS issues
  const script = document.createElement('script');
  const callbackName = 'tumblrCallback_' + Date.now();

  window[callbackName] = function(data) {
    delete window[callbackName];
    script.remove();

    if (!data || !data.posts || !data.posts.length) {
      grid.innerHTML = `<div class="error-state">No posts found.<br>
        <a href="https://gemetc.tumblr.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">Visit gemetc.tumblr.com ↗</a>
      </div>`;
      return;
    }

    const sixMonthsAgo = Date.now() - (6 * 30 * 24 * 60 * 60 * 1000);

    grid.innerHTML = '';
    const recentPosts = data.posts.filter(post => {
      const ts = (post['unix-timestamp'] || 0) * 1000;
      return ts >= sixMonthsAgo;
    }).slice(0, 18);

    if (!recentPosts.length) {
      grid.innerHTML = `<div class="error-state">No posts in the last 6 months.<br>
        <a href="https://gemetc.tumblr.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">Visit gemetc.tumblr.com ↗</a>
      </div>`;
      return;
    }

    recentPosts.forEach(post => {
      const link = post['url-with-slug'] || post.url || '#';
      const card = document.createElement('div');

      if (post.type === 'photo') {
        // Pick best photo size around 500px wide
        const photos = post.photos || [];
        let imgSrc = post['photo-url-500'] || post['photo-url-400'] || post['photo-url-1280'];
        if (!imgSrc && photos.length) {
          imgSrc = photos[0]['photo-url-500'] || photos[0]['photo-url-400'] || photos[0]['photo-url-1280'];
        }
        const caption = stripHtml(post['photo-caption'] || '').trim().slice(0, 120);
        card.className = 'tumblr-card';
        card.innerHTML = `
          <img src="${imgSrc}" alt="${caption}" loading="lazy" onerror="this.closest('.tumblr-card').remove()">
          ${caption ? `<div class="card-overlay"><div class="card-overlay-title">${caption}</div></div>` : ''}`;

      } else if (post.type === 'text') {
        const title = post['title'] || '';
        const body = stripHtml(post['body'] || '').trim().slice(0, 300);
        const display = title || body;
        if (!display) return;
        card.className = 'tumblr-card text-card';
        card.innerHTML = `<div class="text-card-inner">${display}</div>`;

      } else if (post.type === 'quote') {
        const quote = stripHtml(post['quote-text'] || '').trim();
        const source = stripHtml(post['quote-source'] || '').trim();
        if (!quote) return;
        card.className = 'tumblr-card text-card';
        card.innerHTML = `<div class="text-card-inner" style="font-style:normal">"${quote}"${source ? `<br><span style="font-size:0.8em;opacity:0.6;font-style:normal">— ${source}</span>` : ''}</div>`;

      } else if (post.type === 'link') {
        const title = post['link-text'] || post['link-url'] || 'link';
        const desc = stripHtml(post['link-description'] || '').trim().slice(0, 120);
        card.className = 'tumblr-card text-card';
        card.innerHTML = `<div class="text-card-inner">${title}${desc ? `<br><span style="font-size:0.85em;opacity:0.65">${desc}</span>` : ''}</div>`;

      } else if (post.type === 'video') {
        const thumb = post['thumbnail-url'];
        const caption = stripHtml(post['video-caption'] || '').trim().slice(0, 120);
        if (thumb) {
          card.className = 'tumblr-card';
          card.innerHTML = `
            <img src="${thumb}" alt="${caption}" loading="lazy" onerror="this.closest('.tumblr-card').remove()">
            ${caption ? `<div class="card-overlay"><div class="card-overlay-title">${caption}</div></div>` : ''}`;
        } else {
          card.className = 'tumblr-card text-card';
          card.innerHTML = `<div class="text-card-inner">${caption || 'video'}</div>`;
        }
      } else {
        return; // skip other types
      }

      card.addEventListener('click', () => window.open(link, '_blank', 'noopener'));
      grid.appendChild(card);
    });

    if (!grid.children.length) {
      grid.innerHTML = `<div class="error-state">No displayable posts found.<br>
        <a href="https://gemetc.tumblr.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">Visit gemetc.tumblr.com ↗</a>
      </div>`;
    }
  };

  // Timeout fallback
  const timeout = setTimeout(() => {
    if (window[callbackName]) {
      delete window[callbackName];
      script.remove();
      grid.innerHTML = `<div class="error-state">Tumblr feed timed out.<br>
        <a href="https://gemetc.tumblr.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">Visit gemetc.tumblr.com ↗</a>
      </div>`;
    }
  }, 8000);

  script.onerror = () => {
    clearTimeout(timeout);
    delete window[callbackName];
    grid.innerHTML = `<div class="error-state">Could not reach Tumblr API.<br>
      <a href="https://gemetc.tumblr.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">Visit gemetc.tumblr.com ↗</a>
    </div>`;
  };

  script.src = `https://gemetc.tumblr.com/api/read/json?num=50&callback=${callbackName}`;
  document.head.appendChild(script);
}

async function loadArena() {
  const grid = document.getElementById('arena-grid');
  try {
    const res = await fetch('https://api.are.na/v3/users/gem-etcetera/contents?per=100&page=1&sort=created_at_desc');
    if (!res.ok) throw new Error('arena api error ' + res.status);
    const data = await res.json();
    const contents = data.data || [];

    if (!Array.isArray(contents) || !contents.length) throw new Error('no blocks');

    const sixMonthsAgo = new Date(Date.now() - (6 * 30 * 24 * 60 * 60 * 1000)).toISOString();

    const recentBlocks = contents.filter(block => {
      return (block.created_at || '') >= sixMonthsAgo;
    }).slice(0, 40);

    if (!recentBlocks.length) {
      grid.innerHTML = `<div class="error-state">No blocks added in the last 6 months.<br>
        <a href="https://www.are.na/gem-etcetera" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">Visit are.na/gem-etcetera ↗</a>
      </div>`;
      return;
    }

    grid.innerHTML = '';
    recentBlocks.forEach(block => {
      const card = document.createElement('div');
      const selfLink = block._links?.self?.href;
      const blockId = block.id;
      const link = block.source?.url || (selfLink ? 'https://www.are.na' + selfLink : `https://www.are.na/block/${blockId}`);
      const type = block.type || block.base_type || '';

      if (type === 'Image') {
        // v3 image: block.image has size keys like "square", "display", "original"
        const imgUrl = block.image?.display?.url || block.image?.large?.url || block.image?.original?.url || block.image?.thumb?.url;
        if (!imgUrl) return;
        card.className = 'arena-card';
        card.innerHTML = `
          <img src="${imgUrl}" alt="${block.title || ''}" loading="lazy" onerror="this.closest('.arena-card').remove()">
          ${block.title ? `<div class="arena-card-overlay"><span class="arena-card-title">${block.title}</span></div>` : ''}`;

      } else if (type === 'Text') {
        // v3 text: block.content.markdown or block.content.html
        const txt = stripHtml(block.content?.html || block.content?.markdown || block.content || '').trim();
        if (!txt) return;
        card.className = 'arena-card text-block';
        card.innerHTML = `<div class="arena-text">${txt}</div>`;

      } else if (type === 'Link') {
        card.className = 'arena-card link-block';
        let domain = '';
        try { domain = new URL(block.source?.url || '').hostname.replace('www.',''); } catch(e) {}
        const title = block.title || block.source?.url || 'link';
        // If link has a preview image, show that instead
        const imgUrl = block.image?.display?.url || block.image?.large?.url;
        if (imgUrl) {
          card.className = 'arena-card';
          card.innerHTML = `
            <img src="${imgUrl}" alt="${title}" loading="lazy" onerror="this.style.display='none'">
            <div class="arena-card-overlay" style="opacity:1;background:rgba(26,25,22,0.55)">
              <span class="arena-card-title">${title}</span>
            </div>`;
        } else {
          card.innerHTML = `
            <div class="link-title">${title}</div>
            <div class="link-source">${domain}</div>`;
        }

      } else if (type === 'Attachment') {
        const imgUrl = block.image?.display?.url || block.image?.large?.url;
        if (imgUrl) {
          card.className = 'arena-card';
          card.innerHTML = `<img src="${imgUrl}" alt="${block.title || ''}" loading="lazy" onerror="this.closest('.arena-card').remove()">`;
        } else {
          card.className = 'arena-card link-block';
          card.innerHTML = `<div class="link-title">${block.title || 'file'}</div><div class="link-source">attachment</div>`;
        }

      } else if (type === 'Embed' || type === 'Media') {
        const imgUrl = block.image?.display?.url || block.image?.large?.url;
        if (imgUrl) {
          card.className = 'arena-card';
          card.innerHTML = `<img src="${imgUrl}" alt="${block.title || ''}" loading="lazy" onerror="this.closest('.arena-card').remove()">`;
        } else {
          card.className = 'arena-card link-block';
          card.innerHTML = `<div class="link-title">${block.title || type.toLowerCase()}</div>`;
        }

      } else if (type === 'Channel') {
        card.className = 'arena-card link-block';
        card.innerHTML = `
          <div class="link-title">${block.title || 'channel'}</div>
          <div class="link-source">channel</div>`;

      } else {
        // fallback: try to show something
        const fallback = stripHtml(block.content?.html || block.content?.markdown || block.content || block.title || '').trim();
        if (!fallback) return;
        card.className = 'arena-card text-block';
        card.innerHTML = `<div class="arena-text">${fallback}</div>`;
      }

      card.addEventListener('click', () => window.open(link, '_blank', 'noopener'));
      grid.appendChild(card);
    });

    if (!grid.children.length) throw new Error('empty after render');

  } catch (e) {
    grid.innerHTML = `<div class="error-state">
      Unable to load Are.na content.<br>
      <a href="https://www.are.na/gem-etcetera" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">Visit are.na/gem-etcetera ↗</a>
    </div>`;
  }
}

document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

loadTumblr();
loadArena();
</script>
</body>
</html>
