<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F8F8F2;
      --text: #1c1c1e;
      --text-muted: #6b6b6b;
      --border: #e2e2da;
      --accent: #DC1F26;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 80px 32px 120px;
    }

    /* ── Header ── */
    header {
      margin-bottom: 72px;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 32px;
    }

    header h1 {
      font-size: clamp(1rem, 2vw, 1.4rem);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }

    header p {
      margin-top: 8px;
      font-size: 0.95rem;
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
    }

    /* ── Sections ── */
    section {
      margin-bottom: 72px;
    }

    section h2 {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      font-family: 'Geist Mono', monospace;
    }

    /* ── Text block ── */
    .text-block p {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--text);
      max-width: 680px;
    }

    /* ── Image block ── */
    .image-block img {
      width: 100%;
      display: block;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .image-block figcaption {
      margin-top: 10px;
      font-size: 0.82rem;
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
    }

    /* ── Video block ── */
    .video-block {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #efefea;
      border-radius: 4px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .video-block iframe,
    .video-block video {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Link block ── */
    .link-block a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .link-block a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Iframe block ── */
    .iframe-block {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 4px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .iframe-block iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }
    /* ── Divider ── */
    hr.divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 56px 0;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding-top: 28px;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- ── Header ────────────────────────────────────── -->
    <header>
      <h1>gem etcetera</h1>
      <p>last updated may 27, 2026</p>
    </header>

    <!-- ── Text ──────────────────────────────────────── -->
    <section class="text-block">
      <h2>Text</h2>
      <p>
        Replace this with whatever you want to say. This is a plain paragraph block. 
        You can duplicate this as many times as you need and mix it with the blocks below.
      </p>
    </section>

    <hr class="divider" />

    <!-- ── Image ─────────────────────────────────────── -->
    <section>
      <h2>Image</h2>
      <figure class="image-block">
        <!-- Replace src with your image path or URL -->
        <img src="https://drive.google.com/file/d/1y2SsoZ9cbqzf-VJXw5wEsq85cUtsTm0a/view?usp=sharing" alt="Photo of Gem" />
        <figcaption>Caption goes here — location, date, or credit</figcaption>
      </figure>
    </section>

    <hr class="divider" />

    <!-- ── Video (YouTube embed) ──────────────────────── -->
    <section>
      <h2>Video</h2>
      <div class="video-block">
        <!-- Replace VIDEO_ID with your YouTube ID, or swap for a <video> tag -->
        <iframe
          src="https://www.youtube.com/embed/dQw4w9WgXcQ"
          title="Video"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <hr class="divider" />

    <!-- ── Iframe ────────────────────────────────────── -->
    <section>
      <h2>Embed</h2>
      <div class="iframe-block">
        <!-- Replace src with your URL -->
        <iframe
          src="https://example.com"
          title="Embed"
          frameborder="0"
          loading="lazy">
        </iframe>
      </div>
    </section>

    <hr class="divider" />

    <!-- ── Link ──────────────────────────────────────── -->
    <section>
      <h2>Link</h2>
      <div class="link-block">
        <a href="https://example.com" target="_blank" rel="noopener">
          example.com →
        </a>
      </div>
    </section>

    <!-- ── Footer ────────────────────────────────────── -->
    <footer>
      <p>your name · your-site.github.io</p>
    </footer>

  </div>
</body>
</html>
